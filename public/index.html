<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save link chrome extension</title>
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="/src/input.css">
</head>
<body class="font-[Arial, Helvetical, sans-serif] box-border p-3">
        <input class="px-4 w-full border border-[#5f9341] mb-1 text-bold box-border" type="text" name="input-el" id="input-el">
        <div class="flex gap-1">
        <button class="bg-[#5f9341] border border-[#5f9341] text-white px-4 w-36 py-1 text-[12px] font-bold" type="button" id="input-btn">SAVE INPUT</button>
        <button class="bg-[#5f9341] border border-[#5f9341] text-white px-4 w-36 py-1 text-[12px] font-bold" type="button" id="tab-btn">SAVE TAB</button>
        <button class="text-[#5f9341] border border-[#5f9341] bg-white px-4 w-36 py-1 text-[12px] font-bold" type="button" id="delete-btn">DELETE ALL</button>

        </div>
        <ul id="ul-el" class="mt-5 text-[#5f9341]">
        </ul>
    

    <script src="index.js"></script>
</body>
</html>
